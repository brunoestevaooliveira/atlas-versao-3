version: '3.8'

services:
  # Serviço simplificado para desenvolvimento
  atlas-dev:
    image: node:20-alpine
    container_name: atlas-civico-dev
    working_dir: /app
    ports:
      - "9002:9002"
    volumes:
      - .:/app
      - atlas_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev"
    networks:
      - atlas-network
    restart: unless-stopped

networks:
  atlas-network:
    driver: bridge

volumes:
  atlas_node_modules:
